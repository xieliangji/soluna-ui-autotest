schemaVersion: "1.0"
id: aiot-minio
type: minio
endpoint: http://aiot-testing.ugreeniot.com:19000
secure: false
bucket: autotest-reports
prefix: soluna-ui-autotest
credentials:
  accessKey: minio-access-key
  secretKey: minio-secret-key
upload:
  workerCount: 1
  queueCapacity: 512
  drainTimeoutMs: 60000
  compression:
    enabled: true
    minBytes: 0
    contentTypes:
      - text/*
      - application/json
      - application/xml
      - application/javascript
      - application/*+json
      - application/*+xml
  retry:
    maxAttempts: 5
    initialDelayMs: 1000
    maxDelayMs: 30000
    backoffMultiplier: 2.0
notifications:
  uploadFailures: ./dingtalk.template.yaml
  planStarted: ./dingtalk.template.yaml
  testFinished: ./dingtalk.template.yaml
  reportPublished: ./dingtalk.template.yaml
