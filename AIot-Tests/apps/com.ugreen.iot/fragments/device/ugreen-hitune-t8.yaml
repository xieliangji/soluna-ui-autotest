schemaVersion: "1.0"
id: t8-device-fragments
description: T8-specific device state normalization fragments.
fragments:
  ensureGameModeOff:
    name: Ensure T8 Game Mode Off
    elementRefs:
      - id: t8
        file: ../../elements/device/ugreen-hitune-t8.yaml
    actions:
      - swipe:
          id: scroll-t8-detail-to-game-mode-for-reset
          element: t8.detailScrollView
          startElementXRatio: 0.50
          startElementYRatio: 0.83
          endElementXRatio: 0.50
          endElementYRatio: 0.49
          durationMs: 500
          desc: 在详情页滚动容器内滑动露出 T8 游戏模式开关用于状态归一
      - tap:
          id: dismiss-t8-firmware-upgrade-prompt-before-game-mode-reset-if-present
          element: t8.firmwareUpgradeIgnoreButton
          ignoreMissingElement: true
          ignoreMissingElementReason: optionalFirmwareUpgradePrompt
          desc: 状态归一前固件升级提示可能出现；如出现则点击忽略
          wait:
            timeoutMs: 5000
            intervalMs: 500
          settleMs: 1000
      - if:
          assertElementAttrEquals: detect-t8-game-mode-on-before-reset
          element: t8.gameModeSwitch
          attr: value
          expected: "1"
          desc: 检测 T8 游戏模式当前是否已开启
        then:
          - tap:
              id: turn-t8-game-mode-off-before-case
              element: t8.gameModeSwitch
              desc: 若游戏模式已开启则先关闭，避免正式用例反向切换
              settleMs: 1000
              wait:
                timeoutMs: 5000
                intervalMs: 500
        else: []
      - assertElementAttrEquals:
          id: assert-t8-game-mode-off-before-case
          element: t8.gameModeSwitch
          attr: value
          expected: "0"
          desc: 确认 T8 游戏模式已归一为关闭状态
          wait:
            timeoutMs: 5000
            intervalMs: 500

  ensureHighQualityCodecOff:
    name: Ensure T8 High Quality Codec Off
    elementRefs:
      - id: t8
        file: ../../elements/device/ugreen-hitune-t8.yaml
    actions:
      - swipe:
          id: scroll-t8-detail-to-high-quality-codec-for-reset
          element: t8.detailScrollView
          startElementXRatio: 0.50
          startElementYRatio: 0.83
          endElementXRatio: 0.50
          endElementYRatio: 0.42
          durationMs: 500
          desc: 在详情页滚动露出 T8 高音质解码入口用于状态归一
      - tap:
          id: dismiss-t8-firmware-upgrade-prompt-before-high-quality-reset-if-present
          element: t8.firmwareUpgradeIgnoreButton
          ignoreMissingElement: true
          ignoreMissingElementReason: optionalFirmwareUpgradePrompt
          desc: 状态归一前固件升级提示可能出现；如出现则点击忽略
          wait:
            timeoutMs: 5000
            intervalMs: 500
          settleMs: 1000
      - tap:
          id: open-t8-high-quality-codec-page-for-reset
          element: t8.highQualityCodecEntry
          desc: 打开 T8 高音质解码页检查初始状态
          settleMs: 1000
          wait:
            timeoutMs: 5000
            intervalMs: 500
      - assertElementExists:
          id: assert-t8-high-quality-codec-switch-visible-for-reset
          element: t8.highQualityCodecSwitch
          desc: 确认高音质解码页已打开并显示开关
          wait:
            timeoutMs: 5000
            intervalMs: 500
      - if:
          assertElementAttrEquals: detect-t8-high-quality-codec-on-before-reset
          element: t8.highQualityCodecSwitch
          attr: value
          expected: "1"
          desc: 检测 T8 高音质解码当前是否已开启
        then:
          - tap:
              id: turn-t8-high-quality-codec-off-before-case
              element: t8.highQualityCodecSwitch
              desc: 若高音质解码已开启则先关闭；Android 会断开重连并自动回详情页
              settleMs: 3000
              wait:
                timeoutMs: 5000
                intervalMs: 500
          - assertElementExists:
              id: assert-t8-high-quality-entry-visible-after-reset-off
              element: t8.highQualityCodecEntry
              desc: 确认关闭高音质解码后已自动回到详情页并恢复连接
              wait:
                timeoutMs: 30000
                intervalMs: 1000
        else:
          - tap:
              id: back-from-t8-high-quality-codec-page-after-reset-check
              element: t8.morePageBackButton
              desc: 高音质解码已关闭时返回详情页继续正式用例
              settleMs: 1000
              wait:
                timeoutMs: 5000
                intervalMs: 500
      - assertElementExists:
          id: assert-t8-high-quality-entry-visible-after-reset
          element: t8.highQualityCodecEntry
          desc: 确认高音质解码状态归一后停留在详情页
          wait:
            timeoutMs: 10000
            intervalMs: 500
