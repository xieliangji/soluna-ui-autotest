schemaVersion: "1.0"
id: app-state
description: Reusable app state initialization fragments for UGREEN.
fragments:
  restartApp:
    name: Restart App
    actions:
      - restartApp:
          id: restart-before-case
          appId: "${app.id}"
          desc: 用例前重启应用
      - wait:
          id: wait-after-case-restart
          durationMs: 5000
          desc: 重启后等待启动稳定

  loginPage:
    name: Ensure Login Page
    elementRefs:
      - id: common
        file: ../elements/common.yaml
    actions:
      - 重启App:
          id: restart-for-login-page
          appId: "${app.id}"
          desc: 重启目标应用
      - wait:
          id: wait-after-login-page-restart
          durationMs: 5000
          desc: 重启后等待启动稳定
      - if:
          assertElementExists:
            id: detect-device-page-for-login-page
            element: common.deviceAddButton
            wait:
              timeoutMs: 2000
              intervalMs: 500
            desc: 判断重启后是否在设备页
        then:
          - tap:
              id: open-mine-tab-for-login-page
              element: common.mineTab
              desc: 点击我的Tab
          - tap:
              id: open-profile-entry-for-login-page
              element: common.profileEntry
              desc: 点击头像区域
          - if:
              assertElementExists:
                id: detect-guest-login-prompt-for-login-page
                element: common.dialogPositiveButton
                wait:
                  timeoutMs: 3000
                  intervalMs: 500
                desc: 未登录态会弹出去登录询问框
            then:
              - tap:
                  id: go-login-after-guest-profile-entry
                  element: common.dialogPositiveButton
                  desc: 点击去登录
            else:
              - tap:
                  id: tap-logout-button-for-login-page
                  element: common.logoutButton
                  desc: 点击退出登录按钮
              - tap:
                  id: confirm-logout-for-login-page
                  element: common.logoutConfirmButton
                  desc: 确认退出登录
        else: []
      - if:
          assertElementExists:
            id: detect-login-page-ready-by-guest-entry
            element: common.guestEntryButton
            wait:
              timeoutMs: 3000
              intervalMs: 500
            desc: 判断是否已经在登录页
        then: []
        else:
          - if:
              assertElementExists:
                id: detect-back-button-before-login-page-ready
                element: common.backButton
                wait:
                  timeoutMs: 2000
                  intervalMs: 500
                desc: 判断是否停留在登录子页面
            then:
              - tap:
                  id: back-to-login-page-from-auth-child-page
                  element: common.backButton
                  desc: 从注册或忘记密码页返回登录页
              - wait:
                  id: wait-after-back-to-login-page
                  durationMs: 1000
                  desc: 等待登录页恢复
            else: []
      - assertElementExists:
          id: assert-login-page-ready
          element: common.guestEntryButton
          wait:
            timeoutMs: 30000
            intervalMs: 500
          desc: 校验已收敛到登录页

  guestDevicePage:
    name: Ensure Guest Device Page
    elementRefs:
      - id: common
        file: ../elements/common.yaml
    actions:
      - restartApp:
          id: restart-for-guest-device-page
          appId: "${app.id}"
          desc: 重启目标应用
      - wait:
          id: wait-after-guest-device-page-restart
          durationMs: 5000
          desc: 重启后等待启动稳定
      - if:
          assertElementExists:
            id: detect-device-page-for-guest-device-page
            element: common.deviceAddButton
            wait:
              timeoutMs: 2000
              intervalMs: 500
            desc: 判断重启后是否在设备页
        then:
          - tap:
              id: open-mine-tab-for-guest-state-check
              element: common.mineTab
              desc: 点击我的Tab
          - tap:
              id: open-profile-entry-for-guest-state-check
              element: common.profileEntry
              desc: 点击头像区域
          - if:
              assertElementExists:
                id: detect-guest-login-prompt-for-guest-device-page
                element: common.dialogPositiveButton
                wait:
                  timeoutMs: 3000
                  intervalMs: 500
                desc: 未登录态会弹出去登录询问框
            then:
              - tap:
                  id: dismiss-guest-login-prompt-for-guest-device-page
                  xRatio: 0.5
                  yRatio: 0.2
                  desc: 点击空白处关闭去登录询问框
              - wait:
                  id: wait-after-dismissing-guest-login-prompt
                  durationMs: 1000
                  desc: 等待弹框关闭
              - tap:
                  id: back-to-device-tab-after-guest-prompt-check
                  element: common.deviceTab
                  desc: 回到设备Tab
            else:
              - tap:
                  id: tap-logout-button-for-guest
                  element: common.logoutButton
                  desc: 点击退出登录按钮
              - tap:
                  id: confirm-logout-for-guest
                  element: common.logoutConfirmButton
                  desc: 确认退出登录
              - if:
                  assertElementExists:
                    id: detect-login-agreement-unchecked-after-logout-before-guest-entry
                    element: common.loginAgreementUncheckedCheckbox
                    wait:
                      timeoutMs: 2000
                      intervalMs: 500
                    desc: 判断登录页同意按钮是否未勾选
                then:
                  - tap:
                      id: select-login-agreement-after-logout-before-guest-entry
                      element: common.loginAgreementCheckbox
                      desc: 勾选登录页同意按钮
                else: []
              - tap:
                  id: enter-guest-device-page-after-logout
                  element: common.guestEntryButton
                  desc: 点击立即体验进入游客设备页
        else:
          - if:
              assertElementExists:
                id: detect-guest-mine-page-before-guest-entry
                element: common.mineList
                wait:
                  timeoutMs: 2000
                  intervalMs: 500
                desc: 判断是否停留在游客我的页
            then:
              - tap:
                  id: back-to-device-tab-from-guest-mine-page
                  element: common.deviceTab
                  desc: 从游客我的页回到设备Tab
            else:
              - if:
                  assertElementExists:
                    id: detect-login-agreement-unchecked-before-guest-entry
                    element: common.loginAgreementUncheckedCheckbox
                    wait:
                      timeoutMs: 2000
                      intervalMs: 500
                    desc: 判断登录页同意按钮是否未勾选
                then:
                  - tap:
                      id: select-login-agreement-before-guest-entry
                      element: common.loginAgreementCheckbox
                      desc: 勾选登录页同意按钮
                else: []
              - tap:
                  id: enter-guest-device-page-from-login
                  element: common.guestEntryButton
                  desc: 点击立即体验进入游客设备页
      - if:
          assertElementExists:
            id: assert-guest-device-page-ready-by-device-page
            element: common.deviceAddButton
            wait:
              timeoutMs: 10000
              intervalMs: 500
            desc: 校验已收敛到游客设备页
        then: []
        else:
          - assertElementExists:
              id: assert-guest-device-page-ready-after-entry
              element: common.deviceAddButton
              wait:
                timeoutMs: 2000
                intervalMs: 500
              desc: 校验已收敛到游客设备页

  loginAgreementChecked:
    name: Ensure Login Agreement Checked
    elementRefs:
      - id: common
        file: ../elements/common.yaml
    actions:
      - if:
          assertElementExists:
            id: detect-login-agreement-unchecked-for-setup
            element: common.loginAgreementUncheckedCheckbox
            wait:
              timeoutMs: 2000
              intervalMs: 500
            desc: 判断登录页协议是否未勾选
        then:
          - tap:
              id: select-login-agreement-for-setup
              element: common.loginAgreementCheckbox
              desc: 勾选登录页协议
        else: []

  emailRegisterPage:
    name: Ensure Email Register Page
    elementRefs:
      - id: common
        file: ../elements/common.yaml
    actions:
      - tap:
          id: open-register-page-for-email-region
          element: common.registerEntryButton
          desc: 进入注册页
      - if:
          assertElementAttrRegexMatch:
            id: detect-overseas-test-region-for-email-register
            element: common.authCountryRegionTitle
            attr: text
            pattern: "${auth.country.overseasTestPattern}"
            wait:
              timeoutMs: 2000
              intervalMs: 500
            desc: 判断注册页是否已经是海外测试地区
        then: []
        else:
          - tap:
              id: open-country-region-dialog-for-email-register
              element: common.authCountryRegionEntry
              desc: 打开国家地区选择弹框
          - tap:
              id: select-overseas-test-region-for-email-register
              element: common.countryRegionFourthRow
              desc: 选择海外测试地区
          - tap:
              id: confirm-overseas-test-region-selection
              element: common.dialogPositiveButton
              desc: 确认国家地区选择
          - if:
              assertElementAttrRegexMatch:
                id: detect-country-switch-prompt-for-email-register
                element: common.titleText
                attr: text
                pattern: "${auth.country.switchPromptTitlePattern}"
                wait:
                  timeoutMs: 5000
                  intervalMs: 500
                desc: 判断是否出现国家地区切换提示
            then:
              - tap:
                  id: confirm-country-switch-for-email-register
                  element: common.dialogPositiveButton
                  desc: 确认切换国家地区
              - wait:
                  id: wait-after-country-switch-for-email-register
                  durationMs: 3000
                  desc: 等待切换到海外测试地区
            else: []
      - assertElementAttrRegexMatch:
          id: assert-email-register-region-ready
          element: common.authCountryRegionTitle
          attr: text
          pattern: "${auth.country.overseasTestPattern}"
          wait:
            timeoutMs: 10000
            intervalMs: 500
          desc: 校验已进入海外测试注册页

  domesticRegisterRegion:
    name: Ensure Domestic Register Region
    elementRefs:
      - id: common
        file: ../elements/common.yaml
    actions:
      - if:
          assertElementAttrRegexMatch:
            id: detect-domestic-region-for-register
            element: common.authCountryRegionTitle
            attr: text
            pattern: "${auth.country.domesticDevPattern}"
            wait:
              timeoutMs: 2000
              intervalMs: 500
            desc: 判断注册页是否已经是国内开发地区
        then: []
        else:
          - tap:
              id: open-country-region-dialog-for-domestic-register
              element: common.authCountryRegionEntry
              desc: 打开国家地区选择弹框
          - tap:
              id: select-domestic-dev-region-for-register
              element: common.countryRegionFirstRow
              desc: 选择国内开发地区
          - tap:
              id: confirm-domestic-dev-region-selection
              element: common.dialogPositiveButton
              desc: 确认国家地区选择
          - if:
              assertElementAttrRegexMatch:
                id: detect-country-switch-prompt-for-domestic-register
                element: common.titleText
                attr: text
                pattern: "${auth.country.switchPromptTitlePattern}"
                wait:
                  timeoutMs: 5000
                  intervalMs: 500
                desc: 判断是否出现国家地区切换提示
            then:
              - tap:
                  id: confirm-country-switch-for-domestic-register
                  element: common.dialogPositiveButton
                  desc: 确认切换国家地区
              - wait:
                  id: wait-after-country-switch-for-domestic-register
                  durationMs: 3000
                  desc: 等待切换到国内开发地区
            else: []
      - assertElementAttrRegexMatch:
          id: assert-domestic-register-region-ready
          element: common.authCountryRegionTitle
          attr: text
          pattern: "${auth.country.domesticDevPattern}"
          wait:
            timeoutMs: 10000
            intervalMs: 500
          desc: 校验已恢复到国内开发注册页

  loggedInDevicePage:
    name: Ensure Logged-in Device Page
    elementRefs:
      - id: common
        file: ../elements/common.yaml
    actions:
      - restartApp:
          id: restart-for-logged-in-device-page
          appId: "${app.id}"
          desc: 重启目标应用
      - wait:
          id: wait-after-logged-in-device-page-restart
          durationMs: 5000
          desc: 重启后等待启动稳定
      - if:
          assertElementExists:
            id: detect-device-page-for-logged-in-device-page
            element: common.deviceAddButton
            wait:
              timeoutMs: 1000
              intervalMs: 500
            desc: 判断重启后是否在设备页
        then:
          - tap:
              id: open-mine-tab-for-login-check
              element: common.mineTab
              desc: 点击我的Tab
          - tap:
              id: open-profile-entry-for-login-check
              element: common.profileEntry
              desc: 点击头像区域
          - if:
              assertElementExists:
                id: detect-guest-login-prompt-for-logged-in-device-page
                element: common.dialogPositiveButton
                wait:
                  timeoutMs: 3000
                  intervalMs: 500
                desc: 未登录态会弹出去登录询问框
            then:
              - tap:
                  id: go-login-after-guest-profile-entry-for-login
                  element: common.dialogPositiveButton
                  desc: 点击去登录
              - input:
                  id: input-login-username-after-guest-profile-entry
                  element: common.loginUsernameInput
                  value: "${appState.login.username}"
                  desc: 输入登录账号
              - tap:
                  id: focus-login-password-after-guest-profile-entry
                  element: common.loginPasswordInput
                  desc: 聚焦登录密码输入框
              - input:
                  id: input-login-password-after-guest-profile-entry
                  element: common.loginPasswordInput
                  value: "${appState.login.password}"
                  clearFirst: true
                  desc: 输入登录密码
              - if:
                  assertElementExists:
                    id: detect-login-agreement-unchecked-after-guest-profile-entry
                    element: common.loginAgreementUncheckedCheckbox
                    wait:
                      timeoutMs: 2000
                      intervalMs: 500
                    desc: 判断登录页同意按钮是否未勾选
                then:
                  - tap:
                      id: select-login-agreement-after-guest-profile-entry
                      element: common.loginAgreementCheckbox
                      desc: 勾选登录协议
                else: []
              - tap:
                  id: submit-login-after-guest-profile-entry
                  element: common.loginSubmitButton
                  desc: 提交登录
            else:
              - tap:
                  id: back-from-profile-page-after-login-check
                  element: common.backButton
                  desc: 已登录态从个人信息页返回
              - tap:
                  id: open-device-tab-after-login-check
                  element: common.deviceTab
                  desc: 点击设备Tab
        else:
          - input:
              id: input-login-username
              element: common.loginUsernameInput
              value: "${appState.login.username}"
              desc: 输入登录账号
          - tap:
              id: focus-login-password
              element: common.loginPasswordInput
              desc: 聚焦登录密码输入框
          - input:
              id: input-login-password
              element: common.loginPasswordInput
              value: "${appState.login.password}"
              clearFirst: true
              desc: 输入登录密码
          - if:
              assertElementExists:
                id: detect-login-agreement-unchecked-before-login-submit
                element: common.loginAgreementUncheckedCheckbox
                wait:
                  timeoutMs: 2000
                  intervalMs: 500
                desc: 判断登录页同意按钮是否未勾选
            then:
              - tap:
                  id: select-login-agreement-before-login-submit
                  element: common.loginAgreementCheckbox
                  desc: 勾选登录协议
            else: []
          - tap:
              id: submit-login
              element: common.loginSubmitButton
              desc: 提交登录
      - assertElementExists:
          id: assert-logged-in-device-page-ready
          element: common.deviceAddButton
          wait:
            timeoutMs: 30000
            intervalMs: 500
          desc: 校验已收敛到登录态设备页
