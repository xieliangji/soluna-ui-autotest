schemaVersion: "1.0"
id: ugreen-common-android-feedback-device-debug
name: UGREEN Common Android Feedback Device Debug
version: "0.1.0"
metadata:
  owner: qa
  suite: common
  intent: 调试意见反馈设备选择用例，需要账号下存在可选设备
parameters:
  - id: appState
    file: ../../data/app-state.yaml
  - id: appStateLocal
    file: ../../data/app-state.android.local.yaml
    required: false
  - id: visualTemplates
    file: ../../data/common/visual-templates.yaml
fragmentRefs:
  - id: appState
    file: ../../fragments/app-state.yaml
deviceConfig: ../../../../devices/android/ZT4225X3C2.yaml
artifactStore: ../../../../artifacts/minio.local.yaml
app:
  id: com.ugreen.iot
  name: UGREEN
  platform: android
  reset: false
defaults:
  implicitWaitMs: 8000
  failureStrategy: stop-case
  retryStrategy: no-retry
trace:
  screenshots:
    enabled: true
    beforeAction: onFailure
    retainBeforeActionCount: 5
    upload: onFailure
localArtifacts:
  cleanup:
    mode: after-upload-success
stages:
  - id: logged-in-device-page
    name: Logged-in Device Page
    setupFragments:
      - appState.loggedInDevicePage
    caseSetupFragments:
      - appState.restartApp
    caseRefs:
      - file: ../../cases/common/TC012_FEEDBACK_DEVICE.yaml
