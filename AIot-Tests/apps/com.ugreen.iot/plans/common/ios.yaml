schemaVersion: "1.0"
id: ugreen-common-ios
name: UGREEN Common iOS
version: "0.1.0"
metadata:
  owner: qa
  suite: common
  intent: 验证我的页公共功能和个人信息保护入口
parameters:
  - id: appState
    file: ../../data/app-state.yaml
  - id: appStateLocal
    file: ../../data/app-state.ios.local.yaml
    required: false
  - id: visualTemplates
    file: ../../data/common/visual-templates.yaml
  - id: visualTemplatesIos
    file: ../../data/common/visual-templates.ios.yaml
  - id: auth
    file: ../../data/common/auth.yaml
  - id: authIos
    file: ../../data/common/auth.ios.yaml
    required: false
fragmentRefs:
  - id: appState
    file: ../../fragments/app-state.yaml
deviceConfig: ../../../../devices/ios/00008140-001805D80C93801C.yaml
artifactStore: ../../../../artifacts/minio.local.yaml
app:
  id: com.ugreen.iot
  name: UGREEN
  platform: ios
  reset: false
defaults:
  implicitWaitMs: 8000
  failureStrategy: continue-case
  retryStrategy: no-retry
trace:
  screenshots:
    enabled: true
    beforeAction: onFailure
    retainBeforeActionCount: 5
    upload: onFailure
localArtifacts:
  cleanup:
    mode: after-upload-success
stages:
  - id: login-page
    name: Login Page
    setupFragments:
      - appState.loginPage
    caseRefs:
      - file: ../../cases/common/app-state/login-page.yaml
  - id: auth-login-page
    name: Auth Login Page
    setupFragments:
      - appState.loginPage
    caseSetupFragments:
      - appState.loginPage
    caseRefs:
      - file: ../../cases/common/TC024_LOGIN_PASSWORD_VISIBILITY_IOS.yaml
      - file: ../../cases/common/TC026_LOGIN_CODE_SEND_CODE_IOS.yaml
      - file: ../../cases/common/TC027_FORGOT_PASSWORD_SEND_CODE_IOS.yaml
      - file: ../../cases/common/TC028_REGISTER_AGREEMENT_UNCHECKED_IOS.yaml
      - file: ../../cases/common/TC029_REGISTER_PHONE_SEND_CODE_IOS.yaml
      - file: ../../cases/common/TC030_REGISTER_EMAIL_SEND_CODE_IOS.yaml
      - file: ../../cases/common/TC025_LOGIN_PASSWORD_SUCCESS_IOS.yaml
  - id: logged-in-device-page
    name: Logged-in Device Page
    setupFragments:
      - appState.loggedInDevicePage
    caseSetupFragments:
      - appState.loggedInDevicePage
    caseRefs:
      - file: ../../cases/common/TC001_MINE_ABOUT.yaml
      - file: ../../cases/common/TC003_MINE_SYSTEM_PERMISSIONS_MANAGEMENT.yaml
      - file: ../../cases/common/TC010_FEEDBACK_SUBMIT_SUCCESS.yaml
      - file: ../../cases/common/TC011_FEEDBACK_PROBLEM_TYPE.yaml
      - file: ../../cases/common/TC013_FEEDBACK_DESCRIPTION.yaml
      - file: ../../cases/common/TC014_FEEDBACK_HISTORY_LIST.yaml
      - file: ../../cases/common/TC015_FEEDBACK_HISTORY_DETAIL.yaml
      - file: ../../cases/common/TC004_PERSONAL_INFO_PROTECTION_AGREENMENT.yaml
      - file: ../../cases/common/TC005_PERSONAL_INFO_PROTECTION_PRIVACY.yaml
      - file: ../../cases/common/TC006_PERSONAL_INFO_PROTECTION_COLLECTION_LIST.yaml
      - file: ../../cases/common/TC007_PERSONAL_INFO_PROTECTION_SHARED_LIST.yaml
      - file: ../../cases/common/TC008_PERSONAL_INFO_PROTECTION_WITHDRAW_CONTENT.yaml
      - file: ../../cases/common/TC002_MINE_LANGUAGE_SETTINGS.yaml
      - file: ../../cases/common/TC018_PROFILE_AVATAR_VIEW_IOS.yaml
      - file: ../../cases/common/TC021_PROFILE_PASSWORD_SEND_CODE_IOS.yaml
      - file: ../../cases/common/TC020_PROFILE_NICKNAME_DISPLAY_AND_SET_IOS.yaml
      - file: ../../cases/common/TC022_PROFILE_ACCOUNT_CANCELLATION_SEND_CODE_IOS.yaml
      - file: ../../cases/common/TC023_PROFILE_LOGOUT_IOS.yaml
  - id: guest-device-page
    name: Guest Device Page
    setupFragments:
      - appState.guestDevicePage
    caseSetupFragments:
      - appState.restartApp
    caseRefs:
      - file: ../../cases/common/TC001_MINE_ABOUT.yaml
      - file: ../../cases/common/TC003_MINE_SYSTEM_PERMISSIONS_MANAGEMENT.yaml
      - file: ../../cases/common/TC009_FEEDBACK_GUEST_ACCESS.yaml
      - file: ../../cases/common/TC031_GUEST_UNSUPPORTED_FEATURES_IOS.yaml
      - file: ../../cases/common/TC004_PERSONAL_INFO_PROTECTION_AGREENMENT.yaml
      - file: ../../cases/common/TC005_PERSONAL_INFO_PROTECTION_PRIVACY.yaml
      - file: ../../cases/common/TC006_PERSONAL_INFO_PROTECTION_COLLECTION_LIST.yaml
      - file: ../../cases/common/TC007_PERSONAL_INFO_PROTECTION_SHARED_LIST.yaml
      - file: ../../cases/common/TC002_MINE_LANGUAGE_SETTINGS.yaml
