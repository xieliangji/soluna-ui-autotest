schemaVersion: "1.0"
id: ugreen-common-ios-auth-debug
name: UGREEN Common iOS Auth Debug
version: "0.1.0"
metadata:
  owner: qa
  suite: common
  intent: 调试 iOS 登录、注册、验证码和访客限制相关用例
parameters:
  - id: appState
    file: ../../data/app-state.yaml
  - id: appStateLocal
    file: ../../data/app-state.ios.local.yaml
    required: false
  - id: auth
    file: ../../data/common/auth.yaml
    required: false
  - id: authIos
    file: ../../data/common/auth.ios.yaml
    required: false
fragmentRefs:
  - id: appState
    file: ../../fragments/app-state.yaml
deviceConfig: ../../../../devices/ios/00008140-001805D80C93801C.yaml
artifactStore: ../../../../artifacts/minio.local.yaml
app:
  id: com.ugreen.iot
  name: UGREEN
  platform: ios
  reset: false
defaults:
  implicitWaitMs: 8000
  failureStrategy: continue-case
  retryStrategy: no-retry
trace:
  screenshots:
    enabled: true
    beforeAction: onFailure
    retainBeforeActionCount: 10
    upload: onFailure
localArtifacts:
  cleanup:
    mode: never
stages:
  - id: login-page
    name: Login Page
    setupFragments:
      - appState.loginPage
    caseSetupFragments:
      - appState.loginPage
    caseRefs:
      - file: ../../cases/common/app-state/login-page.yaml
      - file: ../../cases/common/TC024_LOGIN_PASSWORD_VISIBILITY_IOS.yaml
      - file: ../../cases/common/TC026_LOGIN_CODE_SEND_CODE_IOS.yaml
      - file: ../../cases/common/TC027_FORGOT_PASSWORD_SEND_CODE_IOS.yaml
      - file: ../../cases/common/TC028_REGISTER_AGREEMENT_UNCHECKED_IOS.yaml
      - file: ../../cases/common/TC029_REGISTER_PHONE_SEND_CODE_IOS.yaml
      - file: ../../cases/common/TC030_REGISTER_EMAIL_SEND_CODE_IOS.yaml
      - file: ../../cases/common/TC025_LOGIN_PASSWORD_SUCCESS_IOS.yaml
  - id: guest-device-page
    name: Guest Device Page
    setupFragments:
      - appState.guestDevicePage
    caseSetupFragments:
      - appState.restartApp
    caseRefs:
      - file: ../../cases/common/TC031_GUEST_UNSUPPORTED_FEATURES_IOS.yaml
