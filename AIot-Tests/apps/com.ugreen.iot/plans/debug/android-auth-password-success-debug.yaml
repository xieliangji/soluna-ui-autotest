schemaVersion: "1.0"
id: ugreen-common-android-auth-password-success-debug
name: UGREEN Common Android Auth Password Success Debug
productModel: UGREEN
version: "0.1.0"
metadata:
  owner: qa
  suite: common
  intent: 单步调试 Android 账号密码登录成功用例
parameters:
  - id: appState
    file: ../../data/app-state.yaml
  - id: appStateLocal
    file: ../../data/app-state.android.local.yaml
    required: false
fragmentRefs:
  - id: appState
    file: ../../fragments/app-state.yaml
deviceConfig: ../../../../devices/android/ZT4225X3C2.yaml
artifactStore: ../../../../artifacts/minio.local.yaml
app:
  id: com.ugreen.iot
  name: UGREEN
  platform: android
  reset: false
defaults:
  implicitWaitMs: 8000
  failureStrategy: stop-case
  retryStrategy: no-retry
trace:
  screenshots:
    enabled: true
    beforeAction: onFailure
    retainBeforeActionCount: 10
    upload: onFailure
localArtifacts:
  cleanup:
    mode: never
stages:
  - id: login-page
    name: Login Page
    setupFragments:
      - appState.loginPage
    caseRefs:
      - file: ../../cases/common/TC025_LOGIN_PASSWORD_SUCCESS_ANDROID.yaml
