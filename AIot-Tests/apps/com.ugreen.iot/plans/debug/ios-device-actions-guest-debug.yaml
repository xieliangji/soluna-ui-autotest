schemaVersion: "1.0"
id: ugreen-common-ios-device-actions-guest-debug
name: UGREEN Common iOS Device Actions Guest Debug
productModel: UGREEN
version: "0.1.0"
metadata:
  owner: qa
  suite: common
  intent: 调试游客态设备列表长按操作窗
parameters:
  - id: appState
    file: ../../data/app-state.yaml
  - id: appStateLocal
    file: ../../data/app-state.ios.local.yaml
    required: false
fragmentRefs:
  - id: appState
    file: ../../fragments/app-state.yaml
deviceConfig: ../../../../devices/ios/00008140-001805D80C93801C.yaml
artifactStore: ../../../../artifacts/minio.local.yaml
app:
  id: com.ugreen.iot
  name: UGREEN
  platform: ios
  reset: false
defaults:
  implicitWaitMs: 8000
  failureStrategy: stop-case
  retryStrategy: no-retry
trace:
  screenshots:
    enabled: true
    beforeAction: onFailure
    retainBeforeActionCount: 5
    upload: never
localArtifacts:
  cleanup:
    mode: never
stages:
  - id: guest-device-page
    name: Guest Device Page
    setupFragments:
      - appState.guestDevicePage
    caseSetupFragments:
      - appState.restartApp
    caseRefs:
      - file: ../../cases/device/common/TC001_DEVICE_RENAME_IOS.yaml
      - file: ../../cases/device/common/TC002_DEVICE_DELETE_CANCEL_IOS.yaml
