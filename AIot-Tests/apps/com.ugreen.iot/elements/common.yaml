      strategy: xpath
      value: "(//*[@resource-id='com.ugreen.iot:id/customTabLayout']//*[@resource-id='com.ugreen.iot:id/llTabContent'])[1]"
    ios:
      strategy: xpath
      value: "//XCUIElementTypeImage[starts-with(@name,'TabHome')]/parent::XCUIElementTypeButton"
  deviceAddButton:
