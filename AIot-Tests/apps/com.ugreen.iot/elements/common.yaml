schemaVersion: "1.0"
id: ugreen-common
description: Common UGREEN app elements shared by public modules such as login, device, and mine.
elements:
  loginPageMarker:
    hardcodedTextReason: language_insensitive_text
    android:
      strategy: xpath
      value: "//*[contains(@text,'UgreenAudio')]"
    ios:
      strategy: predicate
      value: "label CONTAINS 'UgreenAudio' OR name CONTAINS 'UgreenAudio'"
  mineTab:
    hardcodedTextReason: language_insensitive_text
    android:
      strategy: xpath
      value: "(//*[@resource-id='com.ugreen.iot:id/customTabLayout']//*[@resource-id='com.ugreen.iot:id/llTabContent'])[3]"
    ios:
      strategy: xpath
      value: "//XCUIElementTypeImage[starts-with(@name,'TabMine')]/parent::XCUIElementTypeButton"
  deviceTab:
