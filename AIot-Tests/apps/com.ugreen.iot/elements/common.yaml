  targetDeviceCardByMacSuffix:
    parameterizedTextReason: language_insensitive_text
    ios:
      strategy: xpath
      value: "(//XCUIElementTypeTable[@visible='true']/XCUIElementTypeCell[@visible='true'][.//XCUIElementTypeStaticText[contains(string(@name),'${device.targetMacSuffix}') or contains(string(@label),'${device.targetMacSuffix}') or contains(string(@value),'${device.targetMacSuffix}')]])[1]"
