schemaVersion: "1.0"
id: update-and-restore-nickname-android
name: Update And Restore Nickname Android
dataRefs:
  - id: profile
    file: ../../../data/common/profile/update-and-restore-nickname.yaml
elementRefs:
  - id: common
    file: ../../../elements/common.yaml
actions:
  - tap: open-mine-tab
    element: common.mineTab
    desc: 点击我的Tab
  - tap: open-profile-page
    element: common.profileEntry
    desc: 打开个人信息页
  - getText: capture-original-nickname
    element: common.nicknameValue
    scope: case
    saveAs: originalNickname
    desc: 记录原昵称
  - tap: open-nickname-dialog
    element: common.nicknameRow
    desc: 打开昵称编辑弹窗
  - input: input-new-nickname
    element: common.nicknameInput
    value: "${profile.newNickname}"
    desc: 输入新昵称
  - tap: confirm-new-nickname
    element: common.confirmButton
    desc: 确认新昵称
  - assertElementAttrEquals: assert-new-nickname
    element: common.nicknameValue
    attr: text
    expected: "${profile.newNickname}"
    desc: 校验新昵称
teardownFragments:
  - app.restart
teardownActions:
  - tap: open-mine-tab-for-restore
    element: common.mineTab
    desc: 恢复前点击我的Tab
  - tap: open-profile-page-for-restore
    element: common.profileEntry
    desc: 恢复前打开个人信息页
  - tap: open-nickname-dialog-for-restore
    element: common.nicknameRow
    desc: 恢复前打开昵称编辑弹窗
  - input: restore-original-nickname
    element: common.nicknameInput
    value: "@{case.originalNickname}"
    desc: 输入原昵称
  - tap: confirm-original-nickname
    element: common.confirmButton
    desc: 确认恢复原昵称
  - assertElementAttrEquals: assert-original-nickname
    element: common.nicknameValue
    attr: text
    expected: "@{case.originalNickname}"
    desc: 校验原昵称恢复成功
