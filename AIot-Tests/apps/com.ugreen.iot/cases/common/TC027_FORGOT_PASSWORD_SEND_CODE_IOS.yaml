schemaVersion: "1.0"
id: TC027_FORGOT_PASSWORD_SEND_CODE_IOS
name: 忘记密码-发送验证码-iOS
setupFragments:
  - appState.loginAgreementChecked
dataRefs:
  - id: auth
    file: ../../data/common/auth.yaml
elementRefs:
  - id: common
    file: ../../elements/common.yaml
actions:
  - tap:
      id: switch-to-password-login-before-forgot
      element: common.loginPasswordTab
      desc: 切换到密码登录
  - tap:
      id: open-forgot-password-page
      element: common.forgotPasswordEntryButton
      desc: 进入忘记密码页
  - input:
      id: input-forgot-password-account
      element: common.authAccountInput
      value: "${appState.login.username}"
      clearFirst: true
      desc: 输入重置密码账号
  - input:
      id: input-forgot-password-new-password
      element: common.authNewPasswordInput
      value: "${auth.forgotPassword.newPassword}"
      clearFirst: true
      desc: 输入重置后的新密码
  - tap:
      id: send-forgot-password-verification-code
      element: common.authVerificationSendCodeButton
      desc: 触发忘记密码发送验证码
  - assertElementAttrRegexMatch:
      id: assert-forgot-password-countdown
      element: common.authVerificationCountdownText
      attr: name/label/value
      pattern: "${auth.verification.countdownPattern}"
      wait:
        timeoutMs: 10000
        intervalMs: 500
      desc: 校验忘记密码验证码按钮进入倒计时
