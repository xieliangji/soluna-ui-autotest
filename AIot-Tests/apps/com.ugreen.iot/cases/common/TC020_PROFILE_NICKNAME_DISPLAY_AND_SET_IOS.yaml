schemaVersion: "1.0"
id: TC020_PROFILE_NICKNAME_DISPLAY_AND_SET_IOS
name: 个人中心-个人信息-用户昵称显示及设置-iOS
dataRefs:
  - id: mine
    file: ../../data/common/mine.yaml
elementRefs:
  - id: common
    file: ../../elements/common.yaml
actions:
  - tap:
      id: open-mine-tab
      element: common.mineTab
      desc: 进入我的页
  - tap:
      id: open-profile-page
      element: common.profileEntry
      desc: 进入个人信息页
  - assertElementAttrRegexMatch:
      id: assert-profile-page-visible
      element: common.profilePageRoot
      attr: enabled
      pattern: "true"
      desc: 校验个人信息页可见
  - getText:
      id: capture-original-nickname
      element: common.nicknameValue
      scope: case
      saveAs: originalNickname
      desc: 记录原昵称
  - tap:
      id: prime-nickname-dialog-after-restart
      element: common.nicknameRow
      desc: 首次点击昵称触发 iOS 编辑层
  - tap:
      id: dismiss-first-nickname-keyboard-by-top-area
      xRatio: 0.5
      yRatio: 0.2
      desc: 点击页面顶部区域收起首次昵称编辑键盘
  - wait:
      id: wait-after-dismissing-first-nickname-keyboard
      durationMs: 500
      desc: 等待首次昵称编辑键盘收起
  - tap:
      id: dismiss-first-nickname-dialog-by-top-area
      xRatio: 0.5
      yRatio: 0.2
      desc: 再次点击页面顶部区域取消首次昵称编辑层
  - wait:
      id: wait-after-dismissing-first-nickname-dialog
      durationMs: 500
      desc: 等待首次昵称编辑层关闭
  - tap:
      id: open-too-short-nickname-dialog
      element: common.nicknameRow
      desc: 打开昵称设置弹窗
  - input:
      id: input-too-short-nickname
      element: common.nicknameInput
      value: "${mine.profile.nickname.tooShort}"
      clearFirst: true
      desc: 输入少于2个字符的昵称
  - tap:
      id: confirm-too-short-nickname
      element: common.confirmButton
      desc: 确认少于2个字符的昵称
  - assertSourceRegexMatch:
      id: assert-too-short-nickname-prompt
      pattern: "${mine.profile.nickname.tooShortPromptPattern}"
      desc: 校验昵称长度不足提示
  - tap:
      id: dismiss-too-short-nickname-keyboard
      xRatio: 0.5
      yRatio: 0.3
      desc: 点击空白区域收起昵称长度提示键盘
  - wait:
      id: wait-after-dismissing-too-short-nickname-keyboard
      durationMs: 500
      desc: 等待昵称长度提示键盘收起
  - tap:
      id: dismiss-too-short-nickname-dialog
      xRatio: 0.5
      yRatio: 0.3
      desc: 再次点击空白区域关闭昵称弹窗
  - wait:
      id: wait-after-dismissing-too-short-nickname-dialog
      durationMs: 500
      desc: 等待昵称长度提示弹窗关闭
  - tap:
      id: open-cancel-nickname-dialog
      element: common.nicknameRow
      desc: 再次打开昵称设置弹窗
  - input:
      id: input-cancel-nickname
      element: common.nicknameInput
      value: "${mine.profile.nickname.cancelCandidate}"
      clearFirst: true
      desc: 输入取消场景昵称
  - tap:
      id: dismiss-cancel-nickname-keyboard
      xRatio: 0.5
      yRatio: 0.3
      desc: 点击空白区域收起取消场景昵称键盘
  - wait:
      id: wait-after-dismissing-cancel-nickname-keyboard
      durationMs: 500
      desc: 等待取消场景昵称键盘收起
  - tap:
      id: cancel-nickname-by-blank-area
      xRatio: 0.5
      yRatio: 0.3
      desc: 再次点击空白区域取消昵称设置
  - wait:
      id: wait-after-cancel-nickname-by-blank-area
      durationMs: 500
      desc: 等待取消场景昵称弹窗关闭
  - assertElementAttrEquals:
      id: assert-nickname-unchanged-after-cancel
      element: common.nicknameValue
      attr: name/label
      expected: "@{case.originalNickname}"
      desc: 校验取消后昵称未变更
  - tap:
      id: open-long-nickname-dialog
      element: common.nicknameRow
      desc: 打开昵称设置弹窗
  - input:
      id: input-long-nickname
      element: common.nicknameInput
      value: "${mine.profile.nickname.longInput}"
      clearFirst: true
      desc: 输入超过30个字符的昵称
  - tap:
      id: confirm-long-nickname
      element: common.confirmButton
      desc: 确认超过30个字符的昵称
  - assertElementAttrEquals:
      id: assert-long-nickname-truncated
      element: common.nicknameValue
      attr: name/label
      expected: "${mine.profile.nickname.longExpected}"
      desc: 校验超过30个字符后按30字符保存
  - tap:
      id: open-valid-nickname-dialog
      element: common.nicknameRow
      desc: 打开昵称设置弹窗
  - input:
      id: input-valid-nickname
      element: common.nicknameInput
      value: "${mine.profile.nickname.valid}"
      clearFirst: true
      desc: 输入合法昵称
  - tap:
      id: confirm-valid-nickname
      element: common.confirmButton
      desc: 确认合法昵称
  - assertElementAttrEquals:
      id: assert-valid-nickname
      element: common.nicknameValue
      attr: name/label
      expected: "${mine.profile.nickname.valid}"
      desc: 校验合法昵称设置成功
teardownActions:
  - tap:
      id: open-nickname-dialog-for-restore
      element: common.nicknameRow
      desc: 恢复前打开昵称设置弹窗
  - input:
      id: restore-original-nickname
      element: common.nicknameInput
      value: "@{case.originalNickname}"
      clearFirst: true
      desc: 恢复原昵称
  - tap:
      id: confirm-original-nickname
      element: common.confirmButton
      desc: 确认恢复原昵称
  - assertElementAttrEquals:
      id: assert-original-nickname-restored
      element: common.nicknameValue
      attr: name/label
      expected: "@{case.originalNickname}"
      desc: 校验原昵称恢复成功
