schemaVersion: "1.0"
id: TC029_REGISTER_PHONE_SEND_CODE_ANDROID
name: 注册-手机号注册-发送验证码-Android
dataRefs:
  - id: auth
    file: ../../data/common/auth.yaml
elementRefs:
  - id: common
    file: ../../elements/common.yaml
actions:
  - tap:
      id: open-phone-register-page
      element: common.registerEntryButton
      desc: 进入注册页
  - input:
      id: input-phone-register-account
      element: common.authAccountInput
      value: "${auth.register.phone}"
      clearFirst: true
      desc: 输入未注册手机号
  - input:
      id: input-phone-register-password
      element: common.authNewPasswordInput
      value: "${auth.register.password}"
      clearFirst: true
      desc: 输入注册密码
  - tap:
      id: select-phone-register-agreement
      element: common.loginAgreementCheckbox
      desc: 勾选注册协议
  - tap:
      id: send-phone-register-verification-code
      element: common.authVerificationSendCodeButton
      desc: 触发手机号注册发送验证码
  - assertElementAttrRegexMatch:
      id: assert-phone-register-countdown
      element: common.authVerificationSendCodeButton
      attr: text
      pattern: "${auth.verification.countdownPattern}"
      wait:
        timeoutMs: 10000
        intervalMs: 500
      desc: 校验手机号注册验证码按钮进入倒计时
