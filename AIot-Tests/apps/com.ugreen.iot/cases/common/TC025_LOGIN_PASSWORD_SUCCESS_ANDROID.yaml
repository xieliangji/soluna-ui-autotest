schemaVersion: "1.0"
id: TC025_LOGIN_PASSWORD_SUCCESS_ANDROID
name: 登录-账号密码登录-所有数据符合要求-Android
setupFragments:
  - appState.loginAgreementChecked
elementRefs:
  - id: common
    file: ../../elements/common.yaml
actions:
  - tap:
      id: switch-to-password-login
      element: common.loginPasswordTab
      desc: 切换到密码登录
  - input:
      id: input-login-username
      element: common.loginUsernameInput
      value: "${appState.login.username}"
      clearFirst: true
      desc: 输入登录账号
  - input:
      id: input-login-password
      element: common.loginPasswordInput
      value: "${appState.login.password}"
      clearFirst: true
      desc: 输入登录密码
  - tap:
      id: submit-password-login
      element: common.loginSubmitButton
      desc: 提交密码登录
  - assertElementExists:
      id: assert-device-page-after-password-login
      element: common.deviceAddButton
      wait:
        timeoutMs: 30000
        intervalMs: 500
      desc: 校验登录后进入设备列表页
