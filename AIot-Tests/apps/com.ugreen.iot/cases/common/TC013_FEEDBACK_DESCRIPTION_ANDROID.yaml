schemaVersion: "1.0"
id: TC013_FEEDBACK_DESCRIPTION_ANDROID
name: 我的-意见反馈-问题描述或建议-Android
dataRefs:
  - id: mine
    file: ../../data/common/mine.zh-CN.yaml
elementRefs:
  - id: common
    file: ../../elements/common.yaml
actions:
  - tap:
      id: open-mine-tab
      element: common.mineTab
      desc: 进入我的页
  - tap:
      id: open-feedback-page
      element: common.mineFeedbackEntry
      desc: 进入意见反馈页
  - assertElementAttrRegexMatch:
      id: assert-feedback-page-visible
      element: common.feedbackPageRoot
      attr: enabled
      pattern: "true"
      wait:
        timeoutMs: 20000
        intervalMs: 500
      desc: 校验意见反馈页可见
  - tap:
      id: select-feedback-type-for-short-description
      element: common.feedbackTypeOption3
      desc: 选择问题类型
  - tap:
      id: focus-feedback-description
      element: common.feedbackDescriptionInput
      desc: 聚焦问题描述输入框
  - input:
      id: input-short-description
      element: common.feedbackDescriptionInput
      value: "${mine.feedback.shortDescription}"
      desc: 输入少于10个字符的问题描述
  - tap:
      id: blur-short-description-before-assert
      element: common.feedbackTypeOption3
      desc: 收起少于10字符问题描述输入焦点
  - assertElementAttrRegexMatch:
      id: assert-submit-disabled-for-short-description
      element: common.feedbackSubmitButton
      attr: enabled
      pattern: "false"
      desc: 校验少于10个字符时提交按钮不可用
  - input:
      id: input-min-description
      element: common.feedbackDescriptionInput
      value: "${mine.feedback.minDescription}"
      clearFirst: true
      desc: 输入10个字符的问题描述
  - tap:
      id: blur-min-description-before-submit
      element: common.feedbackTypeOption3
      desc: 收起10字符问题描述输入焦点
  - tap:
      id: submit-min-description-feedback
      element: common.feedbackSubmitButton
      desc: 提交10个字符的问题描述
  - assertElementAttrRegexMatch:
      id: assert-back-to-mine-after-min-description-submit
      element: common.mineList
      attr: enabled
      pattern: "true"
      desc: 校验10个字符提交成功后返回我的页
  - tap:
      id: reopen-feedback-page-for-max-description
      element: common.mineFeedbackEntry
      desc: 再次进入意见反馈页
  - assertElementAttrRegexMatch:
      id: assert-feedback-page-visible-for-max-description
      element: common.feedbackPageRoot
      attr: enabled
      pattern: "true"
      wait:
        timeoutMs: 20000
        intervalMs: 500
      desc: 校验再次进入意见反馈页可见
  - tap:
      id: select-feedback-type-for-max-description
      element: common.feedbackTypeOption3
      desc: 选择问题类型
  - input:
      id: input-max-description
      element: common.feedbackDescriptionInput
      value: "${mine.feedback.maxDescription}"
      desc: 输入200个字符的问题描述
  - assertElementAttrRegexMatch:
      id: assert-max-description-counter
      element: common.feedbackDescriptionCounter
      attr: name/label/text
      pattern: "${mine.feedback.maxCounterPattern}"
      desc: 校验200字符计数显示
  - tap:
      id: blur-max-description-before-submit
      element: common.feedbackTypeOption3
      desc: 收起200字符问题描述输入焦点
  - tap:
      id: submit-max-description-feedback
      element: common.feedbackSubmitButton
      desc: 提交200个字符的问题描述
  - assertElementAttrRegexMatch:
      id: assert-back-to-mine-after-max-description-submit
      element: common.mineList
      attr: enabled
      pattern: "true"
      desc: 校验200个字符提交成功后返回我的页
  - tap:
      id: reopen-feedback-page-for-overflow-description
      element: common.mineFeedbackEntry
      desc: 第三次进入意见反馈页
  - assertElementAttrRegexMatch:
      id: assert-feedback-page-visible-for-overflow-description
      element: common.feedbackPageRoot
      attr: enabled
      pattern: "true"
      wait:
        timeoutMs: 20000
        intervalMs: 500
      desc: 校验第三次进入意见反馈页可见
  - tap:
      id: select-feedback-type-for-overflow-description
      element: common.feedbackTypeOption3
      desc: 选择问题类型
  - input:
      id: input-overflow-description
      element: common.feedbackDescriptionInput
      value: "${mine.feedback.overflowDescription}"
      desc: 输入201个字符的问题描述
  - assertElementAttrRegexMatch:
      id: assert-overflow-description-counter
      element: common.feedbackDescriptionCounter
      attr: name/label/text
      pattern: "${mine.feedback.overflowCounterPattern}"
      desc: 校验Android超过200字符后显示超限计数
  - assertElementAttrRegexMatch:
      id: assert-submit-enabled-for-overflow-description
      element: common.feedbackSubmitButton
      attr: enabled
      pattern: "true"
      desc: 校验Android超限时提交按钮仍可用
  - startScreenRecording:
      id: start-overflow-failure-recording
      timeLimitMs: 10000
      desc: 开始录制Android超限提交失败提示
  - tap:
      id: submit-overflow-description-feedback
      element: common.feedbackSubmitButton
      desc: 提交201个字符的问题描述
  - wait:
      id: wait-overflow-failure-toast-recording-window
      durationMs: 3000
      desc: 等待Android超限提交失败提示完成录制
  - stopScreenRecording:
      id: stop-overflow-failure-recording
      resourceId: feedback-overflow-failure-recording
      saveAs: overflowFailureRecording
      desc: 停止录制Android超限提交失败提示
  - assertScreenRecordingTextRegexMatch:
      id: assert-overflow-failure-toast
      source: "@{case.overflowFailureRecording}"
      pattern: "${mine.feedback.overflowFailureToastPattern}"
      recognizer: multimodal
      framesPerSecond: 5
      maxFrames: 25
      candidateMaxFrames: 6
      candidateStrategy: visual-diff-uniform
      visualDifferenceThreshold: 0.01
      roi:
        x: 0.00
        y: 0.508
        width: 1.00
        height: 0.045
      resourceId: feedback-overflow-failure-toast
      desc: 校验Android超限提交失败提示
  - assertElementAttrRegexMatch:
      id: assert-still-on-feedback-page-after-overflow-submit
      element: common.feedbackPageRoot
      attr: enabled
      pattern: "true"
      wait:
        timeoutMs: 5000
        intervalMs: 500
      desc: 校验Android超限提交失败后仍停留在意见反馈页
