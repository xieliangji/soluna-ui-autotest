schemaVersion: "1.0"
id: TC021_PROFILE_PASSWORD_SEND_CODE
name: 个人中心-个人信息-修改密码-发送验证码
dataRefs:
  - id: mine
    file: ../../data/common/mine.zh-CN.yaml
elementRefs:
  - id: common
    file: ../../elements/common.yaml
actions:
  - tap:
      id: open-mine-tab
      element: common.mineTab
      desc: 进入我的页
  - tap:
      id: open-profile-page
      element: common.profileEntry
      desc: 进入个人信息页
  - tap:
      id: open-change-password-page
      element: common.changePasswordEntry
      desc: 进入修改密码验证码页
  - assertElementAttrRegexMatch:
      id: assert-password-verification-code-input-visible
      element: common.profileVerificationCodeInput
      attr: enabled
      pattern: "true"
      desc: 校验修改密码验证码输入框可见
  - tap:
      id: send-password-verification-code
      element: common.profileVerificationSendCodeButton
      desc: 触发修改密码验证码发送
  - assertElementAttrRegexMatch:
      id: assert-password-send-code-countdown
      element: common.profileVerificationSendCodeButton
      attr: name/label
      pattern: "${mine.profile.verification.countdownPattern}"
      wait:
        timeoutMs: 5000
        intervalMs: 500
      desc: 校验发送验证码按钮进入倒计时
