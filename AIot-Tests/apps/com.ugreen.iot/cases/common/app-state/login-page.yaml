schemaVersion: "1.0"
id: app-state-login-page
name: App State Login Page
dataRefs:
  - id: appState
    file: ../../../data/app-state.yaml
elementRefs:
  - id: common
    file: ../../../elements/common.yaml
setupFragments:
  - appState.loginPage
actions:
  - assertElementAttrRegexMatch:
      id: assert-login-page-ready
      element: common.loginPageMarker
      attr: name/label/text
      pattern: "${appState.patterns.loginPage}"
      desc: 校验已收敛到登录页
