schemaVersion: "1.0"
id: TC024_LOGIN_PASSWORD_VISIBILITY_ANDROID
name: 登录-账号密码登录-密码明暗文功能校验-Android
dataRefs:
  - id: auth
    file: ../../data/common/auth.yaml
elementRefs:
  - id: common
    file: ../../elements/common.yaml
actions:
  - tap:
      id: switch-to-password-login-for-visibility
      element: common.loginPasswordTab
      desc: 切换到密码登录
  - input:
      id: input-password-for-visibility
      element: common.loginPasswordInput
      value: "${appState.login.password}"
      clearFirst: true
      desc: 输入密码
  - assertElementAttrRegexMatch:
      id: assert-password-hidden-before-toggle
      element: common.loginPasswordAnyInput
      attr: password
      pattern: "true"
      desc: 校验密码默认隐藏
  - tap:
      id: toggle-password-visible
      element: common.loginPasswordVisibilityButton
      desc: 点击密码明文图标
  - assertElementAttrRegexMatch:
      id: assert-password-visible-after-toggle
      element: common.loginPasswordAnyInput
      attr: password
      pattern: "false"
      wait:
        timeoutMs: 5000
        intervalMs: 500
      desc: 校验密码切换为明文
  - tap:
      id: toggle-password-hidden-again
      element: common.loginPasswordVisibilityButton
      desc: 再次点击密码明文图标
  - assertElementAttrRegexMatch:
      id: assert-password-hidden-after-second-toggle
      element: common.loginPasswordAnyInput
      attr: password
      pattern: "true"
      wait:
        timeoutMs: 5000
        intervalMs: 500
      desc: 校验密码切回隐藏
