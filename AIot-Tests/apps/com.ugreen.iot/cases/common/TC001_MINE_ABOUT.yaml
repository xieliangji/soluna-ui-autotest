schemaVersion: "1.0"
id: TC001_MINE_ABOUT
name: 我的-关于
dataRefs:
  - id: mine
    file: ../../data/common/mine.yaml
elementRefs:
  - id: common
    file: ../../elements/common.yaml
actions:
  - tap:
      id: open-mine-tab
      element: common.mineTab
      desc: 进入我的页
  - assertElementAttrRegexMatch:
      id: assert-mine-list-visible
      element: common.mineList
      attr: enabled
      pattern: "true"
      desc: 校验我的页列表可见
  - tap:
      id: open-about-page
      element: common.mineAboutEntry
      desc: 进入关于页
  - assertElementAttrRegexMatch:
      id: assert-about-page-root-visible
      element: common.aboutPageRoot
      attr: enabled
      pattern: "true"
      desc: 校验关于页根容器可见
  - assertSourceRegexMatch:
      id: assert-about-app-icon-visible
      pattern: "${mine.about.appIconSourcePattern}"
      desc: 校验关于页 App 图标节点存在
  - assertElementAttrRegexMatch:
      id: assert-about-version-format
      element: common.aboutVersionValue
      attr: name/label/text
      pattern: "${mine.about.versionPattern}"
      desc: 校验关于页版本号格式
  - tap:
      id: back-to-mine-page
      element: common.backButton
      desc: 返回我的页
  - assertElementAttrRegexMatch:
      id: assert-mine-list-after-back
      element: common.mineList
      attr: enabled
      pattern: "true"
      desc: 校验已返回我的页
