schemaVersion: "1.0"
id: TC002_DEVICE_DELETE_CANCEL
name: 设备列表-长按设备项-删除设备取消
dataRefs:
  - id: mine
    file: ../../../data/common/mine.zh-CN.yaml
elementRefs:
  - id: common
    file: ../../../elements/common.yaml
actions:
  - assertElementExists:
      id: assert-first-device-card-visible
      element: common.firstDeviceCard
      desc: 校验设备列表存在第一个设备项
      wait:
        timeoutMs: 10000
        intervalMs: 500
  - getText:
      id: save-device-name-before-delete-cancel
      element: common.firstDeviceName
      saveAs: originalDeviceName
      desc: 记录删除取消前的设备名称
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - longPress:
      id: open-action-menu-for-delete
      element: common.firstDeviceCard
      durationMs: 1200
      desc: 长按第一个设备项打开操作窗
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - tap:
      id: open-delete-confirm-dialog
      element: common.deviceActionMenuLastOption
      desc: 点击操作窗最后一项删除设备，适配未连接设备仅两个功能项的情况
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - assertSourceRegexMatch:
      id: assert-delete-confirm-dialog-content
      pattern: "${mine.device.deleteDialogPattern}"
      desc: 校验删除确认弹框已出现
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: cancel-delete-device
      element: common.dialogNegativeButton
      desc: 点击取消关闭删除确认弹框
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - assertElementAttrEquals:
      id: assert-device-still-exists-after-delete-cancel
      element: common.firstDeviceName
      attr: value/name/label
      expected: "@{case.originalDeviceName}"
      desc: 校验取消删除后第一个设备仍存在且名称未变
      wait:
        timeoutMs: 10000
        intervalMs: 500
