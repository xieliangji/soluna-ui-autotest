schemaVersion: "1.0"
id: TC001_DEVICE_RENAME_IOS
name: 设备列表-长按设备项-重命名-iOS
dataRefs:
  - id: mine
    file: ../../../data/common/mine.yaml
elementRefs:
  - id: common
    file: ../../../elements/common.yaml
teardownActions:
  - tap:
      id: dismiss-any-device-dialog-before-restore
      xRatio: 0.50
      yRatio: 0.08
      desc: 恢复前先点击页面顶部非弹窗区域，避免重命名弹窗或键盘遮挡设备列表
      settleMs: 1000
  - longPress:
      id: reopen-action-menu-for-restore-device-name
      element: common.firstDeviceCard
      durationMs: 1200
      desc: 长按第一个设备项打开操作窗以恢复设备名称
      wait:
        timeoutMs: 10000
        intervalMs: 500
  - tap:
      id: open-rename-dialog-for-restore-device-name
      element: common.deviceActionMenuFirstOption
      desc: 打开重命名弹窗以恢复设备名称
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - input:
      id: restore-original-device-name
      element: common.deviceRenameInput
      value: "@{case.originalDeviceName}"
      desc: 恢复原设备名称
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - tap:
      id: confirm-restore-device-name
      element: common.deviceRenameConfirmButton
      desc: 确认恢复原设备名称
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - assertElementAttrEquals:
      id: assert-original-device-name-restored
      element: common.firstDeviceName
      attr: value/name/label
      expected: "@{case.originalDeviceName}"
      desc: 校验原设备名称已恢复
      wait:
        timeoutMs: 10000
        intervalMs: 500
actions:
  - assertElementExists:
      id: assert-first-device-card-visible
      element: common.firstDeviceCard
      desc: 校验设备列表存在第一个设备项
      wait:
        timeoutMs: 10000
        intervalMs: 500
  - getText:
      id: save-original-device-name
      element: common.firstDeviceName
      saveAs: originalDeviceName
      desc: 记录原设备名称
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - longPress:
      id: open-action-menu-for-prime-rename
      element: common.firstDeviceCard
      durationMs: 1200
      desc: 长按第一个设备项打开操作窗，准备适配首次重命名输入框偏移问题
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - tap:
      id: open-rename-dialog-for-prime
      element: common.deviceActionMenuFirstOption
      desc: 第一次打开重命名弹窗
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - tap:
      id: prime-rename-input-first-click
      xRatio: 0.50
      yRatio: 0.83
      desc: 首次点击重命名输入框，触发 iOS 首次弹窗偏移问题
      settleMs: 1000
  - wait:
      id: wait-after-prime-rename-input
      durationMs: 500
      desc: 等待首次输入框点击后的弹窗状态稳定
  - tap:
      id: dismiss-prime-keyboard-from-top-safe-area
      xRatio: 0.50
      yRatio: 0.08
      desc: 点击页面顶部非弹窗区域收起首次重命名键盘，不点击设备列表区域
      settleMs: 1000
  - tap:
      id: dismiss-prime-rename-dialog-from-top-safe-area
      xRatio: 0.50
      yRatio: 0.08
      desc: 再次点击页面顶部非弹窗区域取消首次重命名弹窗，不点击设备列表区域
      settleMs: 1000
  - assertElementExists:
      id: assert-device-page-after-prime-dismiss
      element: common.firstDeviceCard
      desc: 校验首次重命名弹窗已关闭并回到设备页
      wait:
        timeoutMs: 10000
        intervalMs: 500
  - longPress:
      id: open-action-menu-for-rename
      element: common.firstDeviceCard
      durationMs: 1200
      desc: 再次长按第一个设备项打开操作窗
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - tap:
      id: open-rename-dialog
      element: common.deviceActionMenuFirstOption
      desc: 打开重命名弹窗
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - input:
      id: input-renamed-device-name
      element: common.deviceRenameInput
      value: "${mine.device.renameCandidate}"
      desc: 输入临时设备名称
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - tap:
      id: confirm-renamed-device-name
      element: common.deviceRenameConfirmButton
      desc: 确认设备重命名
      wait:
        timeoutMs: 8000
        intervalMs: 500
  - assertElementAttrEquals:
      id: assert-device-name-renamed
      element: common.firstDeviceName
      attr: value/name/label
      expected: "${mine.device.renameCandidate}"
      desc: 校验设备名称已修改
      wait:
        timeoutMs: 10000
        intervalMs: 500
