schemaVersion: "1.0"
id: TC000_EQUALIZER_PROBE_IOS
name: T8-均衡器页探针-iOS
dataRefs:
  - id: device
    file: ../../../data/device/ugreen-hitune-t8.yaml
elementRefs:
  - id: t8
    file: ../../../elements/device/ugreen-hitune-t8.yaml
setupFragments:
  - device.openTargetDevice
actions:
  - swipe:
      id: scroll-t8-detail-to-equalizer-entry
      element: t8.detailScrollView
      startElementXRatio: 0.50
      startElementYRatio: 0.83
      endElementXRatio: 0.50
      endElementYRatio: 0.26
      durationMs: 500
      desc: 在详情页滚动容器内滑动露出均衡器入口
      settleMs: 1000
  - tap:
      id: open-t8-equalizer-page
      element: t8.equalizerEntry
      desc: 点击 T8 均衡器入口
      settleMs: 1500
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - screenshot:
      id: capture-t8-equalizer-page-probe
      resourceId: t8-equalizer-page-probe
      saveAs: t8EqualizerPageProbe
      desc: 保存 T8 均衡器页面探针截图
