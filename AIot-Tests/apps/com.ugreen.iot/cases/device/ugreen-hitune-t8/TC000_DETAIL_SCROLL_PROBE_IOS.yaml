schemaVersion: "1.0"
id: TC000_DETAIL_SCROLL_PROBE_IOS
name: T8-详情页滚动探针-iOS
dataRefs:
  - id: device
    file: ../../../data/device/ugreen-hitune-t8.yaml
elementRefs:
  - id: t8
    file: ../../../elements/device/ugreen-hitune-t8.yaml
setupFragments:
  - device.openTargetDevice
actions:
  - screenshot:
      id: capture-t8-detail-top-probe
      resourceId: t8-detail-top-probe
      saveAs: t8DetailTopProbe
      desc: 保存 T8 详情页顶部区域探针截图
  - swipe:
      id: scroll-t8-detail-probe-1
      element: t8.detailScrollView
      startElementXRatio: 0.50
      startElementYRatio: 0.83
      endElementXRatio: 0.50
      endElementYRatio: 0.26
      durationMs: 500
      desc: 在详情页滚动容器内向下滚动探测第二屏
      settleMs: 1000
  - screenshot:
      id: capture-t8-detail-middle-probe
      resourceId: t8-detail-middle-probe
      saveAs: t8DetailMiddleProbe
      desc: 保存 T8 详情页中部区域探针截图
  - swipe:
      id: scroll-t8-detail-probe-2
      element: t8.detailScrollView
      startElementXRatio: 0.50
      startElementYRatio: 0.83
      endElementXRatio: 0.50
      endElementYRatio: 0.26
      durationMs: 500
      desc: 继续在详情页滚动容器内向下滚动探测底部
      settleMs: 1000
  - screenshot:
      id: capture-t8-detail-bottom-probe
      resourceId: t8-detail-bottom-probe
      saveAs: t8DetailBottomProbe
      desc: 保存 T8 详情页底部区域探针截图
