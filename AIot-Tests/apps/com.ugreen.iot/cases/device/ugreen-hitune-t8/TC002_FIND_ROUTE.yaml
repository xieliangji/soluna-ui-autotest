schemaVersion: "1.0"
id: TC002_FIND_ROUTE
name: T8-查找耳机-查找路线
dataRefs:
  - id: device
    file: ../../../data/device/ugreen-hitune-t8.yaml
elementRefs:
  - id: t8
    file: ../../../elements/device/ugreen-hitune-t8.yaml
setupFragments:
  - device.openTargetDevice
actions:
  - swipe:
      id: scroll-detail-to-find-earbuds-entry
      element: t8.detailScrollView
      startElementXRatio: 0.50
      startElementYRatio: 0.83
      endElementXRatio: 0.50
      endElementYRatio: 0.25
      durationMs: 500
      desc: 在详情页滚动容器内滑动露出查找耳机入口
  - tap:
      id: dismiss-t8-firmware-upgrade-prompt-after-find-route-scroll-if-present
      element: t8.firmwareUpgradeIgnoreButton
      ignoreMissingElement: true
      ignoreMissingElementReason: optionalFirmwareUpgradePrompt
      desc: 详情页滚动后固件升级提示可能再次出现；如出现则点击忽略
      wait:
        timeoutMs: 5000
        intervalMs: 500
      settleMs: 1000
  - tap:
      id: open-find-earbuds-page
      element: t8.findEarbudsEntry
      desc: 点击详情页底部查找耳机卡片进入查找耳机页
      settleMs: 1500
      wait:
        timeoutMs: 10000
        intervalMs: 500
  - wait:
      id: wait-after-open-find-earbuds-page
      durationMs: 1000
      desc: 等待查找耳机页过渡完成
  - tap:
      id: open-find-route-map
      element: t8.findEarbudsEntry
      desc: 点击查找耳机路线卡片进入地图页
      wait:
        timeoutMs: 10000
        intervalMs: 500
  - assertElementExists:
      id: assert-find-route-map-visible
      element: t8.findEarbudsRouteMap
      desc: 校验查找路线地图已加载
      wait:
        timeoutMs: 15000
        intervalMs: 500
  - wait:
      id: wait-find-route-map-stable
      durationMs: 2000
      desc: 等待地图瓦片和文字稳定加载
  - screenshot:
      id: capture-find-route-map
      resourceId: t8-find-route-map
      saveAs: findRouteMapScreenshot
      desc: 保存查找路线地图页截图用于绿色耳机图标校验
  - assertImageColorRatio:
      id: assert-find-route-map-green-earbuds-marker
      source: "@{case.findRouteMapScreenshot}"
      color: green
      minRatio: 0.02
      minPixels: 200
      roi:
        x: 0.43
        y: 0.465
        width: 0.14
        height: 0.075
      desc: 通过地图绿色耳机图标区域的颜色占比确认耳机位置已定位
