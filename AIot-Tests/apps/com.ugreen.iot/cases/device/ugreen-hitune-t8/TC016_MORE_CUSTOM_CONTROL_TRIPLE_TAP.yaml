schemaVersion: "1.0"
id: TC016_MORE_CUSTOM_CONTROL_TRIPLE_TAP
name: T8-更多页自定义控制三击蓝牙交互
dataRefs:
  - id: device
    file: ../../../data/device/ugreen-hitune-t8.yaml
elementRefs:
  - id: t8
    file: ../../../elements/device/ugreen-hitune-t8.yaml
setupFragments:
  - device.openTargetDevice
actions:
  - tap:
      id: open-t8-more-page-for-triple-tap-control
      element: t8.moreButton
      desc: 打开 T8 更多页
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: open-t8-triple-tap-custom-control-page
      element: t8.moreCustomControlRow
      desc: 打开 T8 自定义控制页面
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - assertElementExists:
      id: assert-t8-triple-tap-control-page-visible
      element: t8.customControlGesturePanel
      desc: 校验 T8 自定义控制页面已打开
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - captureAppLogStart:
      id: start-t8-triple-tap-control-app-log
      saveAs: t8TripleTapControlLogCapture
      desc: 开始采集 T8 三击自定义控制蓝牙交互 App 日志
      maxBufferEntries: 1000
      maxSessionBytes: 5242880
      ttlMs: 60000
      filter:
        ios:
          processRegex: "${device.log.iosProcessRegex}"
  - tap:
      id: normalize-open-t8-left-triple-options
      element: t8.customControlTripleTapRow
      desc: 打开左耳当前三击动作选项用于归一状态
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: normalize-t8-left-triple-to-voice-assistant
      element: t8.customControlOptionSecond
      desc: 将左耳三击归一为语音助手
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - assertElementExists:
      id: assert-t8-left-triple-baseline-voice-assistant
      element: t8.customControlGesturePanel
      desc: 校验自定义控制选择后已回到设置面板
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: open-t8-left-triple-options
      element: t8.customControlTripleTapRow
      desc: 打开左耳三击动作选项
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: set-t8-left-triple-to-game-mode
      element: t8.customControlOptionThird
      desc: 将左耳三击设置为游戏模式
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - assertElementExists:
      id: assert-t8-left-triple-game-mode
      element: t8.customControlGesturePanel
      desc: 校验自定义控制选择后已回到设置面板
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: switch-t8-triple-control-right-tab
      element: t8.customControlRightTab
      desc: 切换到右耳自定义控制
      settleMs: 1500
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: confirm-t8-triple-control-right-tab
      element: t8.customControlRightTab
      desc: 再次点击右耳页签，降低自定义控制页签偶发未切换的影响
      settleMs: 1500
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: normalize-open-t8-right-triple-options
      element: t8.customControlTripleTapRow
      desc: 打开右耳当前三击动作选项用于归一状态
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: normalize-t8-right-triple-to-voice-assistant
      element: t8.customControlOptionSecond
      desc: 将右耳三击归一为语音助手
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - assertElementExists:
      id: assert-t8-right-triple-baseline-voice-assistant
      element: t8.customControlGesturePanel
      desc: 校验自定义控制选择后已回到设置面板
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: open-t8-right-triple-options
      element: t8.customControlTripleTapRow
      desc: 打开右耳三击动作选项
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: set-t8-right-triple-to-game-mode
      element: t8.customControlOptionThird
      desc: 将右耳三击设置为游戏模式
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - assertElementExists:
      id: assert-t8-right-triple-game-mode
      element: t8.customControlGesturePanel
      desc: 校验自定义控制选择后已回到设置面板
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - wait:
      id: wait-after-t8-triple-control-changes
      durationMs: 1000
      desc: 等待三击自定义控制蓝牙交互日志输出
  - captureAppLogEnd:
      id: stop-t8-triple-control-app-log
      source: "@{case.t8TripleTapControlLogCapture}"
      resourceId: t8-triple-tap-control-app-log
      saveAs: t8TripleTapControlLogFile
      desc: 结束采集并保存 T8 三击自定义控制蓝牙交互 App 日志
      readLimit: 500
      maxReadBatches: 10
      maxEntries: 1000
  - customAssertAppLog:
      id: assert-t8-triple-control-log-has-ios-ble-write
      source: "@{case.t8TripleTapControlLogFile}"
      plugin: ugreen-audio
      assertion: ios-ble-write-triggered
      desc: 使用 UGREEN audio 日志插件确认三击自定义控制设置后 iOS 触发 BLE 特征写入
      args:
        containsAll: "${device.log.iosBleWriteContainsAll}"
  - tap:
      id: restore-open-t8-right-triple-options
      element: t8.customControlTripleTapRow
      desc: 打开右耳三击动作选项用于恢复
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: restore-t8-right-triple-to-voice-assistant
      element: t8.customControlOptionSecond
      desc: 恢复右耳三击为语音助手
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - assertElementExists:
      id: assert-t8-right-triple-restored
      element: t8.customControlGesturePanel
      desc: 校验自定义控制选择后已回到设置面板
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: switch-t8-triple-control-left-tab-for-restore
      element: t8.customControlLeftTab
      desc: 切换到左耳准备恢复三击设置
      settleMs: 1500
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: confirm-t8-triple-control-left-tab-for-restore
      element: t8.customControlLeftTab
      desc: 再次点击左耳页签，降低自定义控制页签偶发未切换的影响
      settleMs: 1500
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: restore-open-t8-left-triple-options
      element: t8.customControlTripleTapRow
      desc: 打开左耳三击动作选项用于恢复
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - tap:
      id: restore-t8-left-triple-to-voice-assistant
      element: t8.customControlOptionSecond
      desc: 恢复左耳三击为语音助手
      settleMs: 1000
      wait:
        timeoutMs: 5000
        intervalMs: 500
  - assertElementExists:
      id: assert-t8-left-triple-restored
      element: t8.customControlGesturePanel
      desc: 校验自定义控制选择后已回到设置面板
      wait:
        timeoutMs: 5000
        intervalMs: 500
