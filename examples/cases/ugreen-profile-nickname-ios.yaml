schemaVersion: "1.0"
id: update-and-restore-nickname-ios
name: Update And Restore Nickname iOS
dataRefs:
  - id: profile
    file: ../data/ugreen-profile.yaml
elementRefs:
  - id: profile
    file: ../elements/ugreen-profile.yaml
actions:
  - tap: open-mine-tab
    element: profile.mineTab
    desc: 点击我的Tab
  - tap: open-profile-page
    element: profile.profileEntry
    desc: 打开个人信息页
  - getText: capture-original-nickname
    element: profile.nicknameValue
    scope: case
    saveAs: originalNickname
    desc: 记录原昵称
  - tap: open-covered-nickname-dialog
    element: profile.nicknameRow
    desc: 打开可能被键盘遮挡的昵称弹窗
  - tap: normalize-covered-nickname-dialog
    xRatio: 0.5
    yRatio: 0.3
    desc: 点击弹窗灰色区域让键盘消失
  - wait: settle-after-normalize-covered-nickname-dialog
    durationMs: 500
    desc: 等待弹窗归位
  - tap: close-normalized-nickname-dialog
    xRatio: 0.5
    yRatio: 0.3
    desc: 点击弹窗灰色区域关闭异常弹窗
  - wait: settle-after-close-normalized-nickname-dialog
    durationMs: 500
    desc: 等待弹窗关闭
  - tap: reopen-nickname-dialog
    element: profile.nicknameRow
    desc: 重新打开正常昵称弹窗
  - input: input-new-nickname
    element: profile.nicknameInput
    value: "${profile.newNickname}"
    desc: 输入新昵称
  - tap: confirm-new-nickname
    element: profile.confirmButton
    desc: 确认新昵称
  - assertElementAttrEquals: assert-new-nickname
    element: profile.nicknameValue
    attr: name/label
    expected: "${profile.newNickname}"
    desc: 校验新昵称
teardownFragments:
  - app.restart
teardownActions:
  - tap: open-mine-tab-for-restore
    element: profile.mineTab
    desc: 恢复前点击我的Tab
  - tap: open-profile-page-for-restore
    element: profile.profileEntry
    desc: 恢复前打开个人信息页
  - tap: open-covered-nickname-dialog-for-restore
    element: profile.nicknameRow
    desc: 恢复前打开可能被键盘遮挡的昵称弹窗
  - tap: normalize-covered-nickname-dialog-for-restore
    xRatio: 0.5
    yRatio: 0.3
    desc: 恢复前点击弹窗灰色区域让键盘消失
  - wait: settle-after-normalize-covered-nickname-dialog-for-restore
    durationMs: 500
    desc: 恢复前等待弹窗归位
  - tap: close-normalized-nickname-dialog-for-restore
    xRatio: 0.5
    yRatio: 0.3
    desc: 恢复前点击弹窗灰色区域关闭异常弹窗
  - wait: settle-after-close-normalized-nickname-dialog-for-restore
    durationMs: 500
    desc: 恢复前等待弹窗关闭
  - tap: reopen-nickname-dialog-for-restore
    element: profile.nicknameRow
    desc: 恢复前重新打开正常昵称弹窗
  - input: restore-original-nickname
    element: profile.nicknameInput
    value: "@{case.originalNickname}"
    desc: 输入原昵称
  - tap: confirm-original-nickname
    element: profile.confirmButton
    desc: 确认恢复原昵称
  - assertElementAttrEquals: assert-original-nickname
    element: profile.nicknameValue
    attr: name/label
    expected: "@{case.originalNickname}"
    desc: 校验原昵称恢复成功
