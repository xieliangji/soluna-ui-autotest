schemaVersion: "1.0"
id: ugreen-profile-nickname-ios
name: UGREEN Profile Nickname iOS Smoke
version: "0.1.0"
metadata:
  owner: local
fragmentRefs:
  - id: app
    file: ../fragments/app-lifecycle.yaml
deviceConfig: ../devices/00008140-001805D80C93801C.yaml
app:
  id: com.ugreen.iot
  name: UGREEN
  platform: ios
  reset: false
defaults:
  implicitWaitMs: 5000
  actionWait:
    timeoutMs: 30000
    intervalMs: 500
  failureStrategy: stop-case
  retryStrategy: no-retry
trace:
  screenshots:
    enabled: true
    beforeAction: onFailure
    retainBeforeActionCount: 5
    upload: onFailure
localArtifacts:
  cleanup:
    mode: never
stages:
  - id: profile-nickname
    name: Profile Nickname
    setupFragments:
      - app.restart
    caseRefs:
      - file: ../cases/ugreen-profile-nickname-ios.yaml
